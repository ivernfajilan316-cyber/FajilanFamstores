<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>FajilanFamSTORE | Official</title>
    <style>
        :root {
            --primary: #2c3e50;
            --accent: #e67e22;
            --success: #27ae60;
            --light: #f4f4f4;
            --white: #ffffff;
            --admin: #8e44ad;
            --danger: #ff0000;
        }

        * { box-sizing: border-box; }

        body {
            font-family: 'Segoe UI', Roboto, sans-serif;
            margin: 0;
            background-color: var(--light);
            color: #333;
        }

        header {
            background-color: var(--primary);
            color: white;
            padding: 15px 5%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 2000;
        }

        .categories {
            background: var(--white);
            padding: 12px 5%;
            display: flex;
            gap: 10px;
            overflow-x: auto;
            border-bottom: 1px solid #ddd;
            position: sticky;
            top: 55px;
            z-index: 1900;
        }
        .categories::-webkit-scrollbar { display: none; }

        .cat-btn {
            background: #eee;
            border: none;
            padding: 8px 18px;
            border-radius: 20px;
            cursor: pointer;
            white-space: nowrap;
            font-weight: 500;
        }
        .cat-btn.active { background: var(--accent); color: white; }

        .cart-sticky-section {
            position: sticky;
            top: 108px; 
            z-index: 1800;
            padding: 10px 5%;
            background: var(--light); 
        }

        .box-cart { 
            background: var(--white); 
            padding: 15px; 
            border-radius: 12px; 
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            border: 2px solid var(--accent);
        }

        .cart-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        #cart-items {
            max-height: 150px;
            overflow-y: auto;
            font-size: 0.85rem;
            margin-top: 10px;
            border-top: 1px solid #eee;
            padding-top: 10px;
        }

        .cart-item {
            display: flex;
            justify-content: space-between;
            margin-bottom: 5px;
            padding: 5px 0;
        }

        .container {
            padding: 10px 5% 30px 5%;
        }

        .products-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
            gap: 15px;
        }

        .product-card {
            background: var(--white);
            padding: 12px;
            border-radius: 12px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.06);
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        .product-card img { 
            width: 100%; 
            height: 120px; 
            object-fit: cover; 
            border-radius: 8px; 
            background: #eee;
        }

        .qty-input {
            width: 50px;
            padding: 5px;
            text-align: center;
            border: 1px solid #ddd;
            border-radius: 5px;
        }

        .btn-add {
            background: var(--primary);
            color: white;
            border: none;
            padding: 10px;
            width: 100%;
            cursor: pointer;
            border-radius: 8px;
            font-weight: bold;
            margin-top: 8px;
        }

        .checkout-btn {
            background: var(--success);
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
        }

        .admin-btn {
            width: 100%;
            border: none;
            padding: 8px;
            margin-top: 5px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 0.75rem;
            font-weight: bold;
            color: white;
        }

        .admin-controls {
            display: none;
            background: #2c3e50;
            color: white;
            padding: 15px;
            text-align: center;
        }

        @media (max-width: 480px) {
            .products-grid { grid-template-columns: repeat(2, 1fr); gap: 10px; }
        }
    </style>
</head>
<body>

<header>
    <div class="logo" onclick="adminLogin()" style="cursor:pointer; font-weight: bold;">FajilanFamSTORE</div>
    <div>🛒 <span id="cart-count-header">0</span></div>
</header>

<div id="admin-panel" class="admin-controls">
    <strong style="color: #f1c40f;">OWNER MODE ACTIVE</strong><br>
    <button onclick="addNewProduct()" style="margin: 10px; padding: 10px; cursor:pointer;">➕ MAGDAGDAG NG PRODUKTO</button>
    <button onclick="logoutAdmin()" style="background:var(--danger); color:white; border:none; padding:5px; cursor:pointer;">Logout</button>
</div>

<div class="categories">
    <button class="cat-btn active" onclick="filterProducts('All')">Lahat</button>
    <button class="cat-btn" onclick="filterProducts('Rice')">Rice</button>
    <button class="cat-btn" onclick="filterProducts('Frozen Meat')">Frozen Meat</button>
    <button class="cat-btn" onclick="filterProducts('Drinks')">Inumin</button>
    <button class="cat-btn" onclick="filterProducts('Trigo')">Trigo</button>
    <button class="cat-btn" onclick="filterProducts('Alak')">Alak</button>
</div>

<div class="cart-sticky-section">
    <div class="box-cart">
        <div class="cart-header">
            <div>
                <h3 style="margin:0; color:var(--primary);">My Cart (₱<span id="cart-total">0</span>)</h3>
                <small id="cart-count-text">0 item(s) selected</small>
            </div>
            <button class="checkout-btn" onclick="checkout()">CHECKOUT</button>
        </div>
        <div id="cart-items" style="display:none;"></div>
    </div>
</div>

<div class="container">
    <div class="products-grid" id="products-list"></div>
</div>

<script>
    // Initial Products if LocalStorage is empty
    const defaultProducts = [
        { id: 1, name: "Rice (Per Kilo)", price: 55, cat: "Rice", img: "https://images.unsplash.com/photo-1586201375761-83865001e31c?w=250" },
        { id: 4, name: "Dila Dila", price: 60, cat: "Frozen Meat", img: "https://images.unsplash.com/photo-1602491673980-73aa38de027a?w=250" },
        { id: 5, name: "Coke", price: 25, cat: "Drinks", img: "https://images.unsplash.com/photo-1622483767028-3f66f32aef97?w=250" },
        { id: 6, name: "Royal", price: 25, cat: "Drinks", img: "https://i.pinimg.com/1200x/0c/55/d5/0c55d53c665f8cf0f7bfd2e25674551d.jpg" }
    ];

    let products = JSON.parse(localStorage.getItem('fajilan_prods')) || defaultProducts;
    let cart = [];
    let currentCategory = 'All';

    // --- CORE FUNCTIONS ---

    function saveToStorage() {
        localStorage.setItem('fajilan_prods', JSON.stringify(products));
    }

    function init() {
        const isOwner = sessionStorage.getItem('isFajilanOwner') === 'true';
        document.getElementById('admin-panel').style.display = isOwner ? 'block' : 'none';

        const list = document.getElementById('products-list');
        const filtered = currentCategory === 'All' ? products : products.filter(p => p.cat === currentCategory);
        
        list.innerHTML = filtered.map(p => `
            <div class="product-card">
                <img src="${p.img}" onerror="this.src='https://via.placeholder.com/250?text=No+Image'">
                <div>
                    <h3 style="margin:8px 0 4px 0; font-size:1rem;">${p.name}</h3>
                    <p style="color:var(--accent); font-weight:bold; margin:0 0 8px 0">₱${p.price}</p>
                    <div style="display:flex; align-items:center; gap:5px; margin-bottom:10px;">
                        <input type="number" class="qty-input" id="qty-${p.id}" value="1" min="1">
                        <small style="color:#999">qty</small>
                    </div>
                    <button class="btn-add" onclick="addToCart(${p.id})">ADD TO CART</button>
                    ${isOwner ? `
                        <button class="admin-btn" style="background:var(--admin);" onclick="editProduct(${p.id})">EDIT PRICE</button>
                        <button class="admin-btn" style="background:var(--danger);" onclick="deleteProduct(${p.id})">DELETE</button>
                    ` : ''}
                </div>
            </div>
        `).join('');
    }

    // --- ADMIN LOGIC ---
    window.adminLogin = () => {
        const pass = prompt("Enter Owner Password:");
        if(pass === "fajilan2024") {
            sessionStorage.setItem('isFajilanOwner', 'true');
            location.reload();
        }
    };

    window.logoutAdmin = () => {
        sessionStorage.removeItem('isFajilanOwner');
        location.reload();
    };

    window.addNewProduct = () => {
        const name = prompt("Pangalan ng Produkto:");
        const price = prompt("Presyo (Numero lang):");
        const cat = prompt("Category (Rice, Frozen Meat, Drinks, Trigo, Alak):");
        const img = prompt("Image URL (Link ng picture):");
        
        if(name && price && cat) {
            const newProd = { 
                id: Date.now(), 
                name, 
                price: parseInt(price), 
                cat, 
                img: img || 'https://via.placeholder.com/250' 
            };
            products.push(newProd);
            saveToStorage(); // Automatic save
            init(); // Update dashboard
            alert("Product Saved Automatically!");
        }
    };

    window.editProduct = (id) => {
        const prod = products.find(p => p.id === id);
        const newPrice = prompt(`Bagong presyo para sa ${prod.name}:`, prod.price);
        if(newPrice) {
            prod.price = parseInt(newPrice);
            saveToStorage();
            init();
        }
    };

    window.deleteProduct = (id) => {
        if(confirm("Sigurado ka bang buburahin ito?")) {
            products = products.filter(p => p.id !== id);
            saveToStorage();
            init();
        }
    }

    // --- CART LOGIC ---
    window.filterProducts = (cat) => {
        currentCategory = cat;
        document.querySelectorAll('.cat-btn').forEach(btn => {
            const btnText = btn.innerText === 'Lahat' ? 'All' : (btn.innerText === 'Inumin' ? 'Drinks' : btn.innerText);
            btn.classList.toggle('active', btnText === cat);
        });
        init();
    };

    window.addToCart = (id) => {
        const product = products.find(p => p.id === id);
        const qtyInput = document.getElementById(`qty-${id}`);
        const qty = parseInt(qtyInput.value);
        
        if(qty < 1 || isNaN(qty)) return;

        cart.push({ name: product.name, qty: qty, totalPrice: product.price * qty });
        updateCart();
        qtyInput.value = 1; // reset input
    };

    function updateCart() {
        const itemsDiv = document.getElementById('cart-items');
        const totalSpan = document.getElementById('cart-total');
        const countHeader = document.getElementById('cart-count-header');
        const countText = document.getElementById('cart-count-text');

        countHeader.innerText = cart.length;
        countText.innerText = `${cart.length} item(s) in your cart`;

        if(cart.length === 0) {
            itemsDiv.style.display = "none";
            totalSpan.innerText = "0";
            return;
        }

        itemsDiv.style.display = "block";
        itemsDiv.innerHTML = cart.map((item, idx) => `
            <div class="cart-item">
                <span>${item.name} (x${item.qty})</span>
                <span>₱${item.totalPrice.toLocaleString()} 
                    <button onclick="remove(${idx})" style="color:red; border:none; background:none; cursor:pointer; font-weight:bold;">✕</button>
                </span>
            </div>
        `).join('');

        const grandTotal = cart.reduce((sum, item) => sum + item.totalPrice, 0);
        totalSpan.innerText = grandTotal.toLocaleString();
    }

    window.remove = (idx) => { cart.splice(idx, 1); updateCart(); };

    window.checkout = () => {
        if(cart.length === 0) return alert("Empty cart!");
        
        const name = prompt("Full Name:");
        const address = prompt("Delivery Address:");
        if(!name || !address) return;

        let summary = `*FAJILAN FAM STORE ORDER*\n`;
        summary += `Customer: ${name}\n`;
        summary += `Address: ${address}\n`;
        summary += `--------------------\n`;
        cart.forEach((item, i) => { 
            summary += `${i+1}. ${item.name} (x${item.qty}) = ₱${item.totalPrice}\n`; 
        });
        summary += `--------------------\n`;
        summary += `*TOTAL: ₱${document.getElementById('cart-total').innerText}*`;

        const encodedMsg = encodeURIComponent(summary);
        const choice = confirm("Send via Messenger? (Cancel for SMS)");

        if (choice) {
            window.location.href = `https://m.me/ivern.21903?text=${encodedMsg}`;
        } else {
            window.location.href = `sms:09193349618?body=${encodedMsg}`;
        }
        
        cart = []; 
        updateCart();
    };

    // Load initial view
    init();
</script>

</body>
</html>
